<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Voltex Electronics</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>
<script src="components.js"></script>
<script>injectNavbar(1);</script>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="index.html" class="nav-logo" style="justify-content:center;font-size:1.6rem">
        <span class="bolt">⚡</span>Volt<span>ex</span>
      </a>
    </div>
    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-subtitle">Sign in to your Voltex account</p>

    <div>
      <div class="form-group-inline">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="john@example.com" autocomplete="email">
      </div>
      <div class="form-group-inline">
        <label style="display:flex;align-items:center;justify-content:space-between">
          Password
          <a href="forgot-password.html" style="color:var(--blue-light);font-size:0.8rem;font-weight:400">Forgot password?</a>
        </label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px">
        <input type="checkbox" id="rememberMe" style="width:16px;height:16px;accent-color:var(--blue)">
        <label for="rememberMe" style="font-size:0.85rem;color:var(--slate-light);margin-bottom:0">Remember me for 30 days</label>
      </div>
      <button class="btn btn-primary btn-full btn-lg" onclick="handleLogin()">Sign In →</button>
    </div>

    <div class="auth-divider"><span>or continue with</span></div>

    <button class="btn btn-secondary btn-full" onclick="Toast.show('Google sign-in coming soon!','info')">
      <span style="font-size:1rem">G</span> Continue with Google
    </button>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Create one free →</a>
    </div>
  </div>
</div>

<script src="main.js"></script>
<script>
function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPassword').value;
  if (!email || !pass) { Toast.show('Please fill in all fields', 'error'); return; }
  // Simulate login
  localStorage.setItem('voltex_user', JSON.stringify({ name: 'John Doe', email }));
  Toast.show('Signed in successfully! 🎉', 'success');
  setTimeout(() => window.location.href = 'account.html', 1200);
}
document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
<script src="cart.js"></script>
</body>
</html>
